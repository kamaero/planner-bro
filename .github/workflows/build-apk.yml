name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.41.2'

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Generate Gradle wrapper and launcher icons
        run: |
          # Create a temp Flutter project to extract the Gradle wrapper scripts
          # and default launcher icons (binary files not tracked in git)
          flutter create \
            --project-name planner_bro \
            --org com.plannerbro \
            --platforms android \
            /tmp/flutter_scaffold

          # Copy Gradle wrapper (gradlew is required by flutter build)
          cp /tmp/flutter_scaffold/android/gradlew mobile/android/gradlew
          cp /tmp/flutter_scaffold/android/gradlew.bat mobile/android/gradlew.bat
          chmod +x mobile/android/gradlew
          cp -r /tmp/flutter_scaffold/android/gradle mobile/android/gradle

          # Force modern Gradle wrapper for current Android plugin compatibility.
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.14-all.zip|' \
            mobile/android/gradle/wrapper/gradle-wrapper.properties

          # Copy default launcher icons (PNG binaries)
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p mobile/android/app/src/main/res/mipmap-${density}
            cp /tmp/flutter_scaffold/android/app/src/main/res/mipmap-${density}/ic_launcher.png \
               mobile/android/app/src/main/res/mipmap-${density}/ic_launcher.png
          done

      - name: Inject Firebase credentials
        working-directory: mobile
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "Using Firebase credentials from GitHub secret"
            echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          else
            echo "No GOOGLE_SERVICES_JSON secret — using placeholder (Firebase push will not work)"
          fi

      - name: Install Flutter dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build release APK
        working-directory: mobile
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=https://plannerbro.ru/api/v1

      - name: Rename APK
        id: naming
        run: |
          mkdir -p artifacts
          SHORT_SHA="$(echo "${{ github.sha }}" | head -c 7)"
          VERSION_RAW="$(grep '^version:' mobile/pubspec.yaml | awk '{print $2}')"
          VERSION_SAFE="${VERSION_RAW//+/-}"
          APK_NAME="planner-bro-${VERSION_SAFE}-${SHORT_SHA}.apk"
          TAG_NAME="apk-${VERSION_SAFE}-${SHORT_SHA}"
          cp mobile/build/app/outputs/flutter-apk/app-release.apk "artifacts/${APK_NAME}"
          echo "apk_name=${APK_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_raw=${VERSION_RAW}" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: planner-bro-apk-${{ steps.naming.outputs.version_raw }}
          path: artifacts/planner-bro-*.apk
          retention-days: 30

      - name: Publish APK to GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.naming.outputs.tag_name }}
          name: PlannerBro APK v${{ steps.naming.outputs.version_raw }} (${{ steps.naming.outputs.tag_name }})
          generate_release_notes: true
          files: artifacts/${{ steps.naming.outputs.apk_name }}
          make_latest: true

      - name: Comment APK size
        run: |
          SIZE=$(du -sh artifacts/planner-bro-*.apk | cut -f1)
          echo "APK built successfully — size: $SIZE"
          echo "Download from the Actions tab > Artifacts section"
