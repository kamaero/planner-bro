version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-plannerdb}
      POSTGRES_USER: ${POSTGRES_USER:-planner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-planner} -d ${POSTGRES_DB:-plannerdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: always
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-planner}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-plannerdb}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-planner}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-plannerdb}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
    volumes:
      - ./backend/firebase-credentials.json:/app/firebase-credentials.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"

  celery_worker:
    build:
      context: ./backend
    restart: always
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-planner}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-plannerdb}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-planner}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-plannerdb}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
    volumes:
      - ./backend/firebase-credentials.json:/app/firebase-credentials.json:ro
    depends_on:
      - backend
    command: celery -A app.tasks.celery_app worker --loglevel=warning --concurrency=4

  celery_beat:
    build:
      context: ./backend
    restart: always
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-planner}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-plannerdb}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-planner}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-plannerdb}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
    depends_on:
      - backend
    command: celery -A app.tasks.celery_app beat --loglevel=warning

  frontend:
    build:
      context: ./frontend
      args:
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    restart: always

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
