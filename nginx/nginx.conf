upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

upstream excalidraw_app {
    server frontend:80;
}

upstream excalidraw_storage {
    server frontend:80;
}

upstream excalidraw_room {
    server frontend:80;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name plannerbro.ru www.plannerbro.ru;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 20M;

    # Excalidraw storage backend
    location ^~ /excalidraw-storage/ {
        proxy_pass http://excalidraw_storage/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Excalidraw room websocket
    location /socket.io/ {
        proxy_pass http://excalidraw_room;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Excalidraw app
    location ^~ /excalidraw/assets/ {
        proxy_pass http://excalidraw_app/assets/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 60s;

        sub_filter_once off;
        sub_filter_types text/css application/javascript;
        sub_filter 'https://excalidraw.nyc3.cdn.digitaloceanspaces.com' 'https://plannerbro.ru/excalidraw';
        sub_filter 'https://fonts.googleapis.com' 'https://plannerbro.ru/excalidraw';
        sub_filter 'https://fonts.gstatic.com' 'https://plannerbro.ru/excalidraw';
        sub_filter 'https://esm.sh' 'https://plannerbro.ru/excalidraw';
        sub_filter 'https://excalidraw.com' 'https://plannerbro.ru/excalidraw';
        sub_filter 'https://app.excalidraw.com' 'https://plannerbro.ru/excalidraw';
        sub_filter 'https://plus.excalidraw.com' 'https://plannerbro.ru/excalidraw';
    }

    location = /excalidraw/manifest.webmanifest {
        proxy_pass http://excalidraw_app/manifest.webmanifest;
        proxy_set_header Host $host;
    }

    location = /excalidraw/sw.js {
        proxy_pass http://excalidraw_app/sw.js;
        proxy_set_header Host $host;
    }

    location = /excalidraw/workbox-3631b453.js {
        proxy_pass http://excalidraw_app/workbox-3631b453.js;
        proxy_set_header Host $host;
    }

    location = /excalidraw/favicon.ico {
        proxy_pass http://excalidraw_app/favicon.ico;
        proxy_set_header Host $host;
    }

    location = /excalidraw/favicon-16x16.png {
        proxy_pass http://excalidraw_app/favicon-16x16.png;
        proxy_set_header Host $host;
    }

    location = /excalidraw/favicon-32x32.png {
        proxy_pass http://excalidraw_app/favicon-32x32.png;
        proxy_set_header Host $host;
    }

    location = /excalidraw/Assistant-Regular.woff2 {
        proxy_pass http://excalidraw_app/Assistant-Regular.woff2;
        proxy_set_header Host $host;
    }

    location = /excalidraw/assets/Assistant-Regular.woff2 {
        return 302 /excalidraw/Assistant-Regular.woff2;
    }

    location = /excalidraw/assets/Assistant-Bold.woff2 {
        return 302 /excalidraw/Assistant-Regular.woff2;
    }

    location = /excalidraw/assets/Assistant-Medium.woff2 {
        return 302 /excalidraw/Assistant-Regular.woff2;
    }

    location = /excalidraw/oss/fonts/Assistant/Assistant-Regular.woff2 {
        return 302 /excalidraw/Assistant-Regular.woff2;
    }

    location = /excalidraw/oss/fonts/Assistant/Assistant-Medium.woff2 {
        return 302 /excalidraw/Assistant-Regular.woff2;
    }

    location = /excalidraw/oss/fonts/Assistant/Assistant-SemiBold.woff2 {
        return 302 /excalidraw/Assistant-Regular.woff2;
    }

    location = /excalidraw/oss/fonts/Assistant/Assistant-Bold.woff2 {
        return 302 /excalidraw/Assistant-Regular.woff2;
    }

    location = /excalidraw/assets/Assistant-SemiBold.woff2 {
        return 302 /excalidraw/Assistant-Regular.woff2;
    }

    location ^~ /fonts/ {
        proxy_pass http://excalidraw_app/fonts/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location ^~ /excalidraw/fonts/Assistant/ {
        return 302 /excalidraw/Assistant-Regular.woff2;
    }

    location ^~ /excalidraw/fonts/ {
        rewrite ^/excalidraw/fonts/(.*)$ /fonts/$1 break;
        proxy_pass http://excalidraw_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location ^~ /excalidraw/oss/fonts/ {
        rewrite ^/excalidraw/oss/fonts/(.*)$ /fonts/$1 break;
        proxy_pass http://excalidraw_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location ^~ /excalidraw/@excalidraw/excalidraw@0.15.0/dist/prod/fonts/ {
        rewrite ^/excalidraw/@excalidraw/excalidraw@0.15.0/dist/prod/fonts/(.*)$ /fonts/$1 break;
        proxy_pass http://excalidraw_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Exact match for main HTML — adds Cache-Control: no-store so browsers always fetch fresh
    # (prevents stale cache from serving old HTML with unrewritten CDN URLs behind corporate proxy)
    location = /excalidraw/ {
        proxy_pass http://excalidraw_app/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 60s;

        # Must repeat security headers when add_header overrides parent scope
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "no-store, no-cache" always;

        sub_filter_once off;
        sub_filter_types text/html application/javascript;
        sub_filter '"/assets/' '"/excalidraw/assets/';
        sub_filter '"/fonts/' '"/excalidraw/fonts/';
        sub_filter '"/manifest.webmanifest' '"/excalidraw/manifest.webmanifest';
        sub_filter '"/sw.js' '"/excalidraw/sw.js';
        sub_filter '"/workbox-3631b453.js' '"/excalidraw/workbox-3631b453.js';
        sub_filter '"/favicon.ico' '"/excalidraw/favicon.ico';
        sub_filter '"/favicon-16x16.png' '"/excalidraw/favicon-16x16.png';
        sub_filter '"/favicon-32x32.png' '"/excalidraw/favicon-32x32.png';
        sub_filter 'https://fonts.googleapis.com' 'https://plannerbro.ru/excalidraw';
        sub_filter 'https://fonts.gstatic.com' 'https://plannerbro.ru/excalidraw';
        sub_filter 'https://esm.sh' 'https://plannerbro.ru/excalidraw';
        sub_filter 'https://excalidraw.nyc3.cdn.digitaloceanspaces.com' 'https://plannerbro.ru/excalidraw';
        sub_filter 'https://excalidraw.com' 'https://plannerbro.ru/excalidraw';
        sub_filter 'https://app.excalidraw.com' 'https://plannerbro.ru/excalidraw';
        sub_filter 'https://plus.excalidraw.com' 'https://plannerbro.ru/excalidraw';
    }

    location ^~ /excalidraw/ {
        proxy_pass http://excalidraw_app/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 60s;

        # Excalidraw image is built for root-path (/...), rewrite URLs to /excalidraw/ prefix.
        sub_filter_once off;
        sub_filter_types text/html application/javascript;
        sub_filter '"/assets/' '"/excalidraw/assets/';
        sub_filter '"/fonts/' '"/excalidraw/fonts/';
        sub_filter '"/manifest.webmanifest' '"/excalidraw/manifest.webmanifest';
        sub_filter '"/sw.js' '"/excalidraw/sw.js';
        sub_filter '"/workbox-3631b453.js' '"/excalidraw/workbox-3631b453.js';
        sub_filter '"/favicon.ico' '"/excalidraw/favicon.ico';
        sub_filter '"/favicon-16x16.png' '"/excalidraw/favicon-16x16.png';
        sub_filter '"/favicon-32x32.png' '"/excalidraw/favicon-32x32.png';
        sub_filter 'https://fonts.googleapis.com' 'https://plannerbro.ru/excalidraw';
        sub_filter 'https://fonts.gstatic.com' 'https://plannerbro.ru/excalidraw';
        sub_filter 'https://esm.sh' 'https://plannerbro.ru/excalidraw';
        sub_filter 'https://excalidraw.nyc3.cdn.digitaloceanspaces.com' 'https://plannerbro.ru/excalidraw';
        sub_filter 'https://excalidraw.com' 'https://plannerbro.ru/excalidraw';
        sub_filter 'https://app.excalidraw.com' 'https://plannerbro.ru/excalidraw';
        sub_filter 'https://plus.excalidraw.com' 'https://plannerbro.ru/excalidraw';
    }

    # Block API docs (public exposure)
    location /docs {
        deny all;
        return 404;
    }
    location /openapi.json {
        deny all;
        return 404;
    }
    location /redoc {
        deny all;
        return 404;
    }

    # Import endpoint — large files and long processing time
    location ~ /api/v1/projects/[^/]+/tasks/import {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 100M;
    }

    # API
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket
    location /ws {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /health {
        proxy_pass http://backend;
    }

    # Frontend (SPA)
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
    }
}
